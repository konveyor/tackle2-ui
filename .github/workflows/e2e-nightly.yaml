name: e2e - TEMPORARY TEST - Metrics only on PR

# TEMPORARY: Testing metrics port-forward fix
# Original triggers commented out - restore after testing
# on:
#   workflow_dispatch:
#   schedule:
#     - cron: "0 0 * * *"

on:
  pull_request:
    branches:
      - main

concurrency:
  group: e2e-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly-auth:
    name: "TEST - Application metrics test (auth)"
    uses: ./.github/workflows/e2e-run-ui-tests.yaml
    with:
      test_tags: ""
      feature_auth_required: true
      bundle_image: quay.io/konveyor/tackle2-operator-bundle:latest
      install_konveyor_version: main
      test_ref: ${{ github.ref }}
      test_spec: "**/e2e/tests/custom-metrics/application_metrics.test.ts"
    secrets: inherit

