name: Nightly e2e - run all non-analysis tests (@main)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: e2e-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly-auth:
    name: "Nightly auth - all tiers"
    uses: ./.github/workflows/e2e-run-ui-tests.yaml
    with:
      test_tags: "@ci,@tier0,@tier2,@tier3"
      feature_auth_required: true
      bundle_image: quay.io/konveyor/tackle2-operator-bundle:latest
      ui_image: quay.io/konveyor/tackle2-ui:latest
      install_konveyor_version: main
      test_ref: main
    secrets: inherit

  nightly-noauth:
    name: "Nightly noauth - all tiers"
    uses: ./.github/workflows/e2e-run-ui-tests.yaml
    with:
      test_tags: "@ci,@tier0,@tier2,@tier3"
      feature_auth_required: false
      bundle_image: quay.io/konveyor/tackle2-operator-bundle:latest
      ui_image: quay.io/konveyor/tackle2-ui:latest
      install_konveyor_version: main
      test_ref: main
    secrets: inherit

  slack-notification:
    name: "Send Slack notification"
    runs-on: ubuntu-latest
    needs: [nightly-auth, nightly-noauth]
    if: always()
    steps:
      - name: Determine overall status
        id: status
        run: |
          if [[ "${{ needs.nightly-auth.result }}" == "success" && "${{ needs.nightly-noauth.result }}" == "success" ]]; then
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "emoji=:white_check_mark:" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "emoji=:x:" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2.0.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "${{ steps.status.outputs.emoji }} CI nightly UI e2e tests ${{ steps.status.outputs.status }} on main\nFailed run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
