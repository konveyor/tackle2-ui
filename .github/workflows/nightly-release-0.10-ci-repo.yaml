name: Nightly CI (repo level @release-0.10)

on:
  schedule:
    - cron: "35 5 * * *" # every day @ 5:35am UTC

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  nightly:
    uses: konveyor/tackle2-ui/.github/workflows/ci-repo.yml@release-0.10
    secrets: inherit
    with:
      checkout_ref: release-0.10
