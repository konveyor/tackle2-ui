apiVersion: appstudio.redhat.com/v1beta1
kind: IntegrationTestScenario
metadata:
  name: mta-ui-e2e-fbc-test
  namespace: art-mta-tenant
spec:
  application: mta-8-1
  contexts:
    - description: E2E tests for MTA UI with full operator deployment
      name: mta-e2e-test
  params:
    # Required for deploy-fbc-operator
    - name: CREDENTIALS_SECRET_NAME
      value: openshift-release-dev-pull-secret

    - name: OCI_REF
      value: results.IMAGE_URL

    - name: PACKAGE_NAME
      value: "" # Auto-detected from FBC

    - name: CHANNEL_NAME
      value: "" # Auto-detected from FBC

    # E2E Test Parameters
    - name: TEST_TIER
      value: "@ci,@tier0"

    - name: OPERATOR_NAMESPACE
      value: "konveyor-tackle"

  # Reference our extended pipeline with E2E tests
  resolverRef:
    resolver: git
    params:
      - name: url
        value: https://github.com/sshveta/tackle2-ui.git
      - name: revision
        value: ui_test_konflux_integration
      - name: pathInRepo
        value: .tekton/integration-tests/deploy-fbc-with-e2e-tests.yaml

  # Environment configuration
  environment:
    name: ephemeral-cluster
    type: POC # Proof of Concept cluster
    configuration:
      env:
        - name: KONVEYOR_NAMESPACE
          value: konveyor-tackle
