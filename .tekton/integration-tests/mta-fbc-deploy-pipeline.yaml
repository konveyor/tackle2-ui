apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: mta-fbc-deploy-pipeline
spec:
  description: |
    Deploy MTA operator from FBC catalog to ephemeral cluster.
    Simplified pipeline that avoids when expression bugs in inline taskSpecs.

  params:
    - name: SNAPSHOT
      description: Application Snapshot JSON
      type: string
    - name: CREDENTIALS_SECRET_NAME
      description: Secret containing registry credentials
      type: string
    - name: OCI_REF
      description: OCI artifact reference for storing results
      type: string

  results:
    - name: CLUSTER_NAME
      description: Name of the provisioned cluster
      value: $(tasks.provision-cluster.results.clusterName)
    - name: TEST_OUTPUT
      description: Test execution result
      value: $(tasks.deploy-operator.results.deploymentStatus)

  tasks:
    # Task 1: Parse Snapshot metadata
    - name: parse-metadata
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/integration-examples
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/test_metadata.yaml

    # Task 2: Provision EaaS space
    - name: provision-eaas-space
      runAfter:
        - parse-metadata
      params:
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: task/eaas-provision-space/0.1/eaas-provision-space.yaml

    # Task 3: Provision ephemeral Hypershift cluster (OCP 4.17, x86_64)
    # EaaS provisions Hypershift clusters with hosted control plane
    # Hypershift does NOT have MachineConfigPools on worker nodes
    # Solution: Rewrite FBC catalog references instead of using ImageDigestMirrorSet
    - name: provision-cluster
      runAfter:
        - provision-eaas-space
      params:
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
      taskSpec:
        params:
          - name: eaasSpaceSecretRef
        results:
          - name: clusterName
        steps:
          - name: create-cluster
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-create-ephemeral-cluster-hypershift-aws/0.1/eaas-create-ephemeral-cluster-hypershift-aws.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(params.eaasSpaceSecretRef)
              - name: version
                value: "4.17.0"
              - name: instanceType
                value: "m5.xlarge"
          - name: capture-result
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            env:
              - name: CLUSTER_NAME
                value: $(steps.create-cluster.results.clusterName)
            script: |
              #!/bin/bash
              echo -n "${CLUSTER_NAME}" > $(results.clusterName.path)

    # Task 5: Deploy MTA operator from FBC
    - name: deploy-operator
      runAfter:
        - provision-cluster
      params:
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: $(tasks.provision-cluster.results.clusterName)
        - name: fbcImage
          value: $(tasks.parse-metadata.results.component-container-image)
        - name: packageName
          value: "mta-operator"
        - name: channelName
          value: "stable-v8.1"
        - name: operatorNamespace
          value: "konveyor-tackle"
        - name: credentialsSecretName
          value: $(params.CREDENTIALS_SECRET_NAME)
      taskSpec:
        params:
          - name: eaasSpaceSecretRef
          - name: clusterName
          - name: fbcImage
          - name: packageName
          - name: channelName
          - name: operatorNamespace
          - name: credentialsSecretName
        results:
          - name: deploymentStatus
            description: Deployment status
          - name: csvName
            description: Installed ClusterServiceVersion name
        volumes:
          - name: credentials
            emptyDir: {}
          - name: registry-credentials
            secret:
              secretName: $(params.credentialsSecretName)
              optional: true
        steps:
          # Step 1: Rewrite FBC catalog to use staging registry
          - name: rewrite-fbc-catalog
            image: quay.io/skopeo/stable:latest
            volumeMounts:
              - name: credentials
                mountPath: /credentials
              - name: registry-credentials
                mountPath: /registry-credentials
            env:
              - name: ORIGINAL_FBC_IMAGE
                value: $(params.fbcImage)
            script: |
              #!/bin/bash
              set -euo pipefail

              echo "[INFO] Extracting and rewriting FBC catalog..."
              echo "[INFO] Original FBC image: $ORIGINAL_FBC_IMAGE"

              # Create working directory
              WORK_DIR=$(mktemp -d)
              cd "$WORK_DIR"

              # Download image to OCI format using skopeo
              echo "[INFO] Downloading FBC image using skopeo..."
              mkdir -p oci-image
              skopeo copy "docker://$ORIGINAL_FBC_IMAGE" "oci:oci-image:fbc"

              # Extract using tar on the OCI blobs
              echo "[INFO] Extracting layer content..."
              mkdir -p extracted

              # OCI format stores blobs in blobs/sha256/
              if [ -d "oci-image/blobs/sha256" ]; then
                for blob in oci-image/blobs/sha256/*; do
                  if [ -f "$blob" ]; then
                    # Try to extract as tar
                    tar -xzf "$blob" -C extracted 2>/dev/null || tar -xf "$blob" -C extracted 2>/dev/null || true
                  fi
                done
              fi

              # Find where the actual FBC catalog files are
              echo "[INFO] Searching for FBC catalog files..."

              # Look for JSON/YAML files that contain operator metadata
              CATALOG_FILES=$(find extracted -type f \( -name "*.json" -o -name "*.yaml" -o -name "*.yml" \) 2>/dev/null)

              if [ -z "$CATALOG_FILES" ]; then
                echo "[ERROR] No catalog JSON/YAML files found!"
                echo "[INFO] Extracted directory structure:"
                find extracted -type d 2>/dev/null || true
                echo "[INFO] Sample files:"
                find extracted -type f 2>/dev/null || true
                exit 1
              fi

              # Find the directory containing catalog files
              CATALOG_SOURCE_DIR=$(echo "$CATALOG_FILES" | head -1 | xargs dirname)
              echo "[INFO] Found catalog files in: $CATALOG_SOURCE_DIR"

              # Copy catalog content to a clean directory
              mkdir -p catalog/configs

              # If files are in a configs directory, copy that
              if echo "$CATALOG_SOURCE_DIR" | grep -q "configs"; then
                # Copy the entire configs directory structure
                CONFIGS_ROOT=$(echo "$CATALOG_SOURCE_DIR" | sed 's|/configs.*|/configs|')
                if [ -d "$CONFIGS_ROOT" ]; then
                  cp -r "$CONFIGS_ROOT"/* catalog/configs/ 2>/dev/null || cp -r "$CONFIGS_ROOT" catalog/ 2>/dev/null
                fi
              else
                # Copy all JSON/YAML files to configs
                find extracted -type f \( -name "*.json" -o -name "*.yaml" -o -name "*.yml" \) -exec cp {} catalog/configs/ \; 2>/dev/null || true
              fi

              CATALOG_DIR="catalog"

              # Show what we have
              echo "[INFO] Catalog structure:"
              find $CATALOG_DIR -type f \( -name "*.json" -o -name "*.yaml" -o -name "*.yml" \) 2>/dev/null || true

              # Rewrite registry references
              echo "[INFO] Rewriting registry.redhat.io -> registry.stage.redhat.io..."
              find $CATALOG_DIR -type f \( -name "*.json" -o -name "*.yaml" -o -name "*.yml" \) -exec sed -i 's|registry\.redhat\.io|registry.stage.redhat.io|g' {} \;

              # Verify changes
              echo "[INFO] Verifying rewrites..."
              REWRITE_COUNT=$(grep -r "registry.stage.redhat.io" $CATALOG_DIR 2>/dev/null | wc -l)
              if [ "$REWRITE_COUNT" -gt 0 ]; then
                echo "[INFO] ✅ Successfully rewrote $REWRITE_COUNT registry references"
                echo "[INFO] Sample rewrites:"
                (grep -r "registry.stage.redhat.io" $CATALOG_DIR 2>/dev/null | head -5) || true
              else
                echo "[WARNING] No registry references found - showing sample file content:"
                SAMPLE_FILE=$(find $CATALOG_DIR -type f \( -name "*.json" -o -name "*.yaml" \) 2>/dev/null | head -1)
                if [ -n "$SAMPLE_FILE" ]; then
                  (cat "$SAMPLE_FILE" | head -20) || true
                fi
              fi

              # Save rewritten catalog content to shared volume
              echo "[INFO] Packaging rewritten catalog..."
              tar czf /credentials/rewritten-catalog.tar.gz -C $CATALOG_DIR .

              # Mark as local (we'll use ConfigMap approach)
              echo "LOCAL" > /credentials/rewritten-fbc-image
              echo "[INFO] ✅ Catalog rewrite complete - saved to shared volume"

          # Step 2: Get kubeconfig from EaaS
          - name: get-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(params.eaasSpaceSecretRef)
              - name: clusterName
                value: $(params.clusterName)
              - name: credentials
                value: credentials

          # Step 3: Update global pull secret for registry.stage.redhat.io
          - name: update-pull-secret
            image: registry.redhat.io/openshift4/ose-cli:latest
            volumeMounts:
              - name: credentials
                mountPath: /credentials
              - name: registry-credentials
                mountPath: /registry-credentials
            env:
              - name: KUBECONFIG
                value: /credentials/$(steps.get-kubeconfig.results.kubeconfig)
            script: |
              #!/bin/bash
              set -euo pipefail

              echo "[INFO] Installing jq..."
              curl -sL https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64 -o /tmp/jq
              chmod +x /tmp/jq

              echo "[INFO] Updating pull secret with registry credentials..."

              # Get current cluster pull secret
              EXISTING_SECRET=$(oc get secret pull-secret -n openshift-config -o jsonpath='{.data.\.dockerconfigjson}' 2>/dev/null | base64 -d || echo '{"auths":{}}')

              # Check if external credentials are provided
              if [ -f "/registry-credentials/.dockerconfigjson" ]; then
                echo "[INFO] Found external registry credentials, merging..."
                EXTERNAL_CREDS=$(cat /registry-credentials/.dockerconfigjson)

                # Merge external credentials with existing
                MERGED_SECRET=$(/tmp/jq -s '.[0] * .[1]' <(echo "$EXISTING_SECRET") <(echo "$EXTERNAL_CREDS"))
                echo "[INFO] Merged external credentials"
              else
                echo "[INFO] No external credentials found, copying from registry.redhat.io to registry.stage.redhat.io"

                # Fallback: copy credentials from registry.redhat.io
                REDHAT_CREDS=$(echo "$EXISTING_SECRET" | /tmp/jq -r '.auths["registry.redhat.io"].auth' 2>/dev/null || echo "")

                if [ -n "$REDHAT_CREDS" ] && [ "$REDHAT_CREDS" != "null" ]; then
                  MERGED_SECRET=$(echo "$EXISTING_SECRET" | /tmp/jq --arg auth "$REDHAT_CREDS" '.auths["registry.stage.redhat.io"] = {"auth": $auth}')
                  echo "[INFO] Copied registry.redhat.io credentials to registry.stage.redhat.io"
                else
                  echo "[WARNING] Could not extract registry.redhat.io credentials"
                fi
              fi

              # Apply updated pull secret
              echo "[INFO] Registries in merged secret:"
              echo "$MERGED_SECRET" | /tmp/jq -r '.auths | keys[]'

              TMPFILE=$(mktemp)
              echo "$MERGED_SECRET" > "$TMPFILE"
              oc set data secret/pull-secret -n openshift-config --from-file=.dockerconfigjson="$TMPFILE"
              rm -f "$TMPFILE"
              echo "[INFO] ✅ Pull secret updated successfully"

          # Step 4: Configure image registry mirroring (Hypershift only)
          # NOTE: ImageDigestMirrorSet doesn't work on Hypershift (no MachineConfigPools)
          # We rely on catalog rewrite + pull secret credentials instead
          - name: setup-registry-mirrors
            image: registry.redhat.io/openshift4/ose-cli:latest
            volumeMounts:
              - name: credentials
                mountPath: /credentials
            env:
              - name: KUBECONFIG
                value: /credentials/$(steps.get-kubeconfig.results.kubeconfig)
            script: |
              #!/bin/bash
              set -euo pipefail

              echo "[INFO] Hypershift cluster - ImageDigestMirrorSet not supported"
              echo "[INFO] Skipping IDMS/ITMS creation as they require MachineConfigPool"
              echo "[INFO] Deployment will rely on:"
              echo "  1. Rewritten FBC catalog (registry.redhat.io -> registry.stage.redhat.io)"
              echo "  2. Pull secret with registry.stage.redhat.io credentials"
              echo "[INFO] ✅ Configuration check complete"

          # Step 5: Deploy operator using rewritten catalog
          - name: install-operator
            image: registry.redhat.io/openshift4/ose-cli:latest
            volumeMounts:
              - name: credentials
                mountPath: /credentials
            env:
              - name: KUBECONFIG
                value: /credentials/$(steps.get-kubeconfig.results.kubeconfig)
            script: |
              #!/bin/bash
              set -euo pipefail

              ORIGINAL_FBC_IMAGE="$(params.fbcImage)"
              PACKAGE_NAME="$(params.packageName)"
              CHANNEL_NAME="$(params.channelName)"
              NAMESPACE="$(params.operatorNamespace)"
              CLUSTER_NAME="$(params.clusterName)"

              # Get cluster console URL
              CONSOLE_URL=$(oc whoami --show-console 2>/dev/null || echo "Unable to get console URL")
              API_URL=$(oc whoami --show-server 2>/dev/null || echo "Unable to get API URL")

              # Get password from credentials volume
              PASSWORD_FILE="/credentials/${CLUSTER_NAME}-password"
              if [ -f "$PASSWORD_FILE" ]; then
                CLUSTER_PASSWORD=$(cat "$PASSWORD_FILE")
              else
                CLUSTER_PASSWORD="Password file not found"
              fi

              echo "========================================="
              echo "CLUSTER ACCESS INFORMATION"
              echo "========================================="
              echo "Cluster Name: $CLUSTER_NAME"
              echo "Console URL: $CONSOLE_URL"
              echo "API Server: $API_URL"
              echo "Username: kubeadmin"
              echo "Password: $CLUSTER_PASSWORD"
              echo "========================================="

              # Determine which catalog image to use
              if [ -f "/credentials/rewritten-fbc-image" ]; then
                REWRITTEN_IMAGE=$(cat /credentials/rewritten-fbc-image)
                if [ "$REWRITTEN_IMAGE" = "LOCAL" ]; then
                  echo "[INFO] Using locally rewritten catalog (ConfigMap-based)"
                  FBC_IMAGE="LOCAL"
                else
                  echo "[INFO] Using pushed rewritten catalog: $REWRITTEN_IMAGE"
                  FBC_IMAGE="$REWRITTEN_IMAGE"
                fi
              else
                echo "[WARNING] No rewritten catalog found, using original (may fail on Hypershift)"
                FBC_IMAGE="$ORIGINAL_FBC_IMAGE"
              fi

              echo "========================================="
              echo "Deploying MTA Operator"
              echo "Original FBC Image: $ORIGINAL_FBC_IMAGE"
              echo "Actual FBC Image: $FBC_IMAGE"
              echo "Package: $PACKAGE_NAME"
              echo "Channel: $CHANNEL_NAME"
              echo "Namespace: $NAMESPACE"
              echo "========================================="

              # Create namespace
              echo "[INFO] Creating namespace $NAMESPACE..."
              oc create namespace "$NAMESPACE" || echo "Namespace already exists"

              if [ "$FBC_IMAGE" = "LOCAL" ]; then
                # Create ConfigMap-based catalog
                echo "[INFO] Creating ConfigMap-based catalog from local rewritten content..."

                # Extract rewritten catalog
                mkdir -p /tmp/catalog-content
                tar xzf /credentials/rewritten-catalog.tar.gz -C /tmp/catalog-content

                # Create ConfigMap with catalog content
                oc create configmap mta-fbc-configs -n openshift-marketplace --from-file=/tmp/catalog-content --dry-run=client -o yaml | oc apply -f -

                # Create a pod to serve the catalog
                cat <<EOF | oc apply -f -
              apiVersion: v1
              kind: Pod
              metadata:
                name: mta-konflux-catalog-server
                namespace: openshift-marketplace
                labels:
                  app: mta-konflux-catalog
              spec:
                containers:
                - name: registry-server
                  image: quay.io/operator-framework/opm:latest
                  command: ["/bin/opm"]
                  args: ["serve", "/configs", "-p", "50051"]
                  volumeMounts:
                  - name: configs
                    mountPath: /configs
                  ports:
                  - containerPort: 50051
                    protocol: TCP
                volumes:
                - name: configs
                  configMap:
                    name: mta-fbc-configs
              EOF

                # Create service
                cat <<EOF | oc apply -f -
              apiVersion: v1
              kind: Service
              metadata:
                name: mta-konflux-catalog
                namespace: openshift-marketplace
              spec:
                ports:
                - port: 50051
                  protocol: TCP
                  targetPort: 50051
                selector:
                  app: mta-konflux-catalog
              EOF

                # Wait for pod to be ready
                echo "[INFO] Waiting for catalog server pod..."
                oc wait --for=condition=ready pod/mta-konflux-catalog-server -n openshift-marketplace --timeout=300s

                # Create CatalogSource pointing to local service
                cat <<EOF | oc apply -f -
              apiVersion: operators.coreos.com/v1alpha1
              kind: CatalogSource
              metadata:
                name: mta-konflux-catalog
                namespace: openshift-marketplace
              spec:
                sourceType: grpc
                address: mta-konflux-catalog.openshift-marketplace.svc:50051
                displayName: MTA Konflux Catalog (Rewritten)
                publisher: Red Hat
              EOF
              else
                # Use image-based catalog (rewritten or original)
                echo "[INFO] Creating CatalogSource in openshift-marketplace..."
                cat <<EOF | oc apply -f -
              apiVersion: operators.coreos.com/v1alpha1
              kind: CatalogSource
              metadata:
                name: mta-konflux-catalog
                namespace: openshift-marketplace
              spec:
                sourceType: grpc
                image: $FBC_IMAGE
                displayName: MTA Konflux Catalog (Rewritten)
                publisher: Red Hat
                updateStrategy:
                  registryPoll:
                    interval: 10m
              EOF
              fi

              # Wait for CatalogSource
              echo "[INFO] Waiting for CatalogSource to be ready..."
              for i in {1..60}; do
                STATE=$(oc get catalogsource mta-konflux-catalog -n openshift-marketplace -o jsonpath='{.status.connectionState.lastObservedState}' 2>/dev/null || echo "")
                if [ "$STATE" = "READY" ]; then
                  echo "[INFO] ✅ CatalogSource is READY"
                  break
                fi
                if [ $i -eq 60 ]; then
                  echo "[ERROR] CatalogSource not ready after 5 minutes"
                  oc get catalogsource mta-konflux-catalog -n openshift-marketplace -o yaml
                  exit 1
                fi
                echo "[INFO] Attempt $i/60: State=$STATE, waiting..."
                sleep 5
              done

              # Create OperatorGroup
              echo "[INFO] Creating OperatorGroup..."
              cat <<EOF | oc apply -f -
              apiVersion: operators.coreos.com/v1
              kind: OperatorGroup
              metadata:
                name: mta-operator-group
                namespace: $NAMESPACE
              spec:
                targetNamespaces:
                  - $NAMESPACE
              EOF

              # Create Subscription
              echo "[INFO] Creating Subscription..."
              cat <<EOF | oc apply -f -
              apiVersion: operators.coreos.com/v1alpha1
              kind: Subscription
              metadata:
                name: mta-operator
                namespace: $NAMESPACE
              spec:
                channel: $CHANNEL_NAME
                installPlanApproval: Automatic
                name: $PACKAGE_NAME
                source: mta-konflux-catalog
                sourceNamespace: openshift-marketplace
              EOF

              # Wait for CSV (30 minutes timeout)
              echo "[INFO] Waiting for ClusterServiceVersion..."
              for i in {1..360}; do
                CSV=$(oc get subscription mta-operator -n "$NAMESPACE" -o jsonpath='{.status.installedCSV}' 2>/dev/null || echo "")
                if [ -n "$CSV" ]; then
                  PHASE=$(oc get csv "$CSV" -n "$NAMESPACE" -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
                  if [ "$PHASE" = "Succeeded" ]; then
                    echo "[INFO] ✅ Operator installed successfully: $CSV"
                    echo "$CSV" > $(results.csvName.path)
                    break
                  fi
                  echo "[INFO] Attempt $i/360: CSV=$CSV, Phase=$PHASE"
                fi
                sleep 5
              done

              if [ -z "$CSV" ] || [ "$PHASE" != "Succeeded" ]; then
                echo "[ERROR] CSV not ready after 30 minutes"
                echo "[INFO] Cluster will remain running for debugging"
                echo "[INFO] Cluster: $CLUSTER_NAME"
                echo "[INFO] Console: $CONSOLE_URL"
                echo "[INFO] Password: $CLUSTER_PASSWORD"
                oc get subscription mta-operator -n "$NAMESPACE" -o yaml
                oc get csv -n "$NAMESPACE"
                echo "FAILED" > $(results.deploymentStatus.path)
                exit 1
              fi

              # Wait for mta-operator deployment
              echo "[INFO] Waiting for MTA operator deployment..."
              oc wait --for=condition=available --timeout=300s deployment/mta-operator -n "$NAMESPACE"
              echo "[INFO] ✅ MTA operator deployment is available"

              # Create MTA Custom Resource
              echo "[INFO] Creating MTA Custom Resource..."
              cat <<EOF | oc apply -f -
              apiVersion: tackle.konveyor.io/v1alpha1
              kind: Tackle
              metadata:
                name: mta
                namespace: $NAMESPACE
              spec:
                provider_c_sharp_container_requests_memory: 512Mi
                provider_c_sharp_container_limits_memory: 512Mi
                provider_c_sharp_container_requests_cpu: 500m
                provider_c_sharp_container_limits_cpu: 500m
                language_discovery_container_limits_cpu: 500m
                language_discovery_container_requests_cpu: 500m
                language_discovery_container_limits_memory: 512Mi
                language_discovery_container_requests_memory: 512Mi
                analyzer_container_limits_cpu: 500m
                analyzer_container_requests_cpu: 500m
                analyzer_container_limits_memory: 512Mi
                analyzer_container_requests_memory: 512Mi
                provider_generic_container_limits_cpu: 500m
                provider_generic_container_requests_cpu: 500m
                provider_generic_container_limits_memory: 512Mi
                provider_generic_container_requests_memory: 512Mi
                provider_nodejs_container_limits_cpu: 500m
                provider_nodejs_container_requests_cpu: 500m
                provider_nodejs_container_limits_memory: 512Mi
                provider_nodejs_container_requests_memory: 512Mi
                hub_bucket_volume_size: "25Gi"
                cache_data_volume_size: "25Gi"
              EOF

              # Wait for MTA UI to be ready
              echo "[INFO] Waiting for MTA UI deployment..."
              oc wait --for=condition=ready --timeout=600s pods -l app.kubernetes.io/name=mta-ui -n "$NAMESPACE"
              echo "[INFO] ✅ MTA UI pods are ready"

              # Get UI route
              UI_ROUTE=$(oc get route mta -n "$NAMESPACE" -o jsonpath='{.spec.host}' 2>/dev/null || echo "")
              if [ -n "$UI_ROUTE" ]; then
                UI_URL="https://$UI_ROUTE"
                echo "[INFO] ✅ MTA UI available at: $UI_URL"
              else
                echo "[WARNING] Could not get MTA route"
              fi

              echo "SUCCESS" > $(results.deploymentStatus.path)

              echo ""
              echo "========================================="
              echo "✅ MTA Deployment Complete!"
              echo "========================================="
              echo "Namespace: $NAMESPACE"
              echo "CSV: $CSV"
              echo "MTA URL: ${UI_URL:-<route not found>}"
              echo "Login: admin / Dog8code"
              echo "========================================="
              echo ""
              exit 0
