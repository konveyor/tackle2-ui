apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: mta-fbc-e2e-pipeline
spec:
  description: |
    Deploy MTA operator from FBC catalog to ephemeral Hypershift cluster and run E2E tests.
    Uses imageContentSources to configure registry mirroring.

  params:
    - name: SNAPSHOT
      description: Application Snapshot JSON
      type: string

  results:
    - name: CLUSTER_NAME
      description: Name of the provisioned cluster
      value: $(tasks.provision-cluster.results.clusterName)
    - name: TEST_OUTPUT
      description: Test execution result
      value: $(tasks.deploy-operator.results.deploymentStatus)

  tasks:
    - name: parse-metadata
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/integration-examples
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/test_metadata.yaml

    - name: provision-eaas-space
      runAfter:
        - parse-metadata
      params:
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: task/eaas-provision-space/0.1/eaas-provision-space.yaml

    - name: provision-cluster
      runAfter:
        - provision-eaas-space
      params:
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
      taskSpec:
        params:
          - name: eaasSpaceSecretRef
        results:
          - name: clusterName
        steps:
          - name: create-cluster
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-create-ephemeral-cluster-hypershift-aws/0.1/eaas-create-ephemeral-cluster-hypershift-aws.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(params.eaasSpaceSecretRef)
              - name: version
                value: "4.17.0"
              - name: instanceType
                value: "m5.xlarge"
              - name: imageContentSources
                value: |
                  - source: registry.redhat.io
                    mirrors:
                    - registry.stage.redhat.io
          - name: capture-result
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            env:
              - name: CLUSTER_NAME
                value: $(steps.create-cluster.results.clusterName)
            script: |
              #!/bin/bash
              echo -n "${CLUSTER_NAME}" > $(results.clusterName.path)

    - name: deploy-operator
      runAfter:
        - provision-cluster
      params:
        - name: eaasSpaceSecretRef
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: clusterName
          value: $(tasks.provision-cluster.results.clusterName)
        - name: fbcImage
          value: $(tasks.parse-metadata.results.component-container-image)
        - name: packageName
          value: "mta-operator"
        - name: channelName
          value: "stable-v8.1"
        - name: operatorNamespace
          value: "openshift-mta"
      taskSpec:
        params:
          - name: eaasSpaceSecretRef
          - name: clusterName
          - name: fbcImage
          - name: packageName
          - name: channelName
          - name: operatorNamespace
        results:
          - name: deploymentStatus
            description: Deployment status
          - name: csvName
            description: Installed ClusterServiceVersion name
          - name: uiRoute
            description: MTA UI route hostname
          - name: keycloakPassword
            description: Keycloak admin password
        volumes:
          - name: credentials
            emptyDir: {}
          - name: registry-pull-secrets
            secret:
              secretName: registry-pull-secrets
        steps:
          - name: get-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(params.eaasSpaceSecretRef)
              - name: clusterName
                value: $(params.clusterName)
              - name: credentials
                value: credentials

          - name: add-pull-secrets
            image: registry.redhat.io/openshift4/ose-cli:latest
            volumeMounts:
              - name: credentials
                mountPath: /credentials
              - name: registry-pull-secrets
                mountPath: /registry-secrets
            env:
              - name: KUBECONFIG
                value: /credentials/$(steps.get-kubeconfig.results.kubeconfig)
              - name: OPERATOR_NAMESPACE
                value: $(params.operatorNamespace)
            script: |
              #!/bin/bash
              set -euo pipefail

              if [ ! -f /registry-secrets/.dockerconfigjson ]; then
                echo "[ERROR] Registry secret not found"
                exit 1
              fi

              echo "Installing jq for JSON filtering..."
              curl -sL https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64 -o /tmp/jq
              chmod +x /tmp/jq

              echo "==========================================="
              echo "REGISTRY CREDENTIALS SETUP"
              echo "==========================================="
              echo "Note: Hypershift clusters actively reconcile the global pull secret."
              echo "We will attempt to merge stage credentials, but they may be reverted."
              echo "Main strategy: Use CatalogSource.spec.secrets for bundle pulls."
              echo ""
              echo "Attempting to merge stage credentials into cluster's global pull secret..."

              # Get current global pull secret
              oc get secret pull-secret -n openshift-config -o jsonpath='{.data.\.dockerconfigjson}' | base64 -d > /tmp/current-global-secret.json

              echo "Current global pull secret registries:"
              /tmp/jq -r '.auths | keys[]' /tmp/current-global-secret.json

              # Merge our credentials (prod+stage) with existing global secret
              /tmp/jq -s '.[0].auths * .[1].auths | {auths: .}' \
                /tmp/current-global-secret.json \
                /registry-secrets/.dockerconfigjson \
                > /tmp/merged-global-secret.json

              echo ""
              echo "Updated global pull secret registries:"
              /tmp/jq -r '.auths | keys[]' /tmp/merged-global-secret.json

              # Update the global pull secret
              oc set data secret/pull-secret -n openshift-config --from-file=.dockerconfigjson=/tmp/merged-global-secret.json

              echo "✅ Global pull secret updated with stage credentials"

              # Verify the update worked
              echo ""
              echo "Verifying global pull secret was updated:"
              oc get secret pull-secret -n openshift-config -o jsonpath='{.data.\.dockerconfigjson}' | base64 -d | /tmp/jq -r '.auths | keys[]' | grep -i stage && echo "✅ Stage registry found in global secret" || echo "❌ Stage registry NOT found in global secret"

              echo ""
              echo "All registries in global pull secret:"
              oc get secret pull-secret -n openshift-config -o jsonpath='{.data.\.dockerconfigjson}' | base64 -d | /tmp/jq -r '.auths | keys[]' | sed 's/^/  - /'

              echo ""
              echo "Stage registry details in global secret:"
              oc get secret pull-secret -n openshift-config -o jsonpath='{.data.\.dockerconfigjson}' | base64 -d | /tmp/jq -r '.auths | to_entries[] | select(.key | contains("stage")) | "  Registry: \(.key)\n  Has auth: \(if .value.auth then "yes" else "no" end)"'
              echo "==========================================="
              echo ""

              # Create namespace-level secret with STAGE-ONLY credentials for true stage-only testing
              # Filter to only include registry.stage.redhat.io
              echo "Creating registry-pull-secret in openshift-marketplace with STAGE-ONLY credentials..."
              cat /registry-secrets/.dockerconfigjson | \
                /tmp/jq '.auths |= with_entries(select(.key | contains("registry.stage.redhat.io")))' \
                > /tmp/stage-only-dockerconfig.json

              oc create secret generic registry-pull-secret \
                --from-file=.dockerconfigjson=/tmp/stage-only-dockerconfig.json \
                --type=kubernetes.io/dockerconfigjson \
                -n openshift-marketplace \
                --dry-run=client -o yaml | oc apply -f -

              echo "Registries in openshift-marketplace/registry-pull-secret (stage-only):"
              oc get secret registry-pull-secret -n openshift-marketplace -o jsonpath='{.data.\.dockerconfigjson}' | base64 -d | /tmp/jq -r '.auths | keys[]' | sed 's/^/  - /'
              echo ""
              echo "✅ Stage-only credentials configured - prod registry pulls will fail (no credentials)"
              echo ""

              oc patch serviceaccount default -n openshift-marketplace \
                -p '{"imagePullSecrets": [{"name": "registry-pull-secret"}]}'

              oc create namespace $OPERATOR_NAMESPACE --dry-run=client -o yaml | oc apply -f -

              echo "Creating registry-pull-secret in $OPERATOR_NAMESPACE with STAGE-ONLY credentials..."
              oc create secret generic registry-pull-secret \
                --from-file=.dockerconfigjson=/tmp/stage-only-dockerconfig.json \
                --type=kubernetes.io/dockerconfigjson \
                -n $OPERATOR_NAMESPACE \
                --dry-run=client -o yaml | oc apply -f -

              oc patch serviceaccount default -n $OPERATOR_NAMESPACE \
                -p '{"imagePullSecrets": [{"name": "registry-pull-secret"}]}'

          - name: install-operator
            image: registry.redhat.io/openshift4/ose-cli:latest
            volumeMounts:
              - name: credentials
                mountPath: /credentials
            env:
              - name: KUBECONFIG
                value: /credentials/$(steps.get-kubeconfig.results.kubeconfig)
            script: |
              #!/bin/bash
              set -euo pipefail

              FBC_IMAGE="$(params.fbcImage)"
              PACKAGE_NAME="$(params.packageName)"
              CHANNEL_NAME="$(params.channelName)"
              NAMESPACE="$(params.operatorNamespace)"
              CLUSTER_NAME="$(params.clusterName)"

              echo "========================================="
              echo "FBC CATALOG INSPECTION"
              echo "========================================="
              echo "FBC Image: $FBC_IMAGE"
              echo ""
              echo "Extracting bundle references from FBC catalog..."

              # Use oc image extract to get the catalog content
              mkdir -p /tmp/fbc-content
              if oc image extract "$FBC_IMAGE" --path /configs/:/tmp/fbc-content/ --confirm 2>/dev/null; then
                echo "✅ FBC catalog extracted"
                echo ""
                echo "Bundle images referenced in catalog:"
                grep -r "image:" /tmp/fbc-content/ 2>/dev/null | grep -E "registry\.(redhat|stage)" | head -10 || echo "No bundle images found"
                echo ""
                echo "First bundle reference (if any):"
                grep -r "image:" /tmp/fbc-content/ 2>/dev/null | grep -E "registry\.(redhat|stage)" | head -1 | awk -F'image:' '{print $2}' | tr -d ' "' || echo "None found"
              else
                echo "⚠️  Could not extract FBC catalog content"
              fi
              echo "========================================="
              echo ""

              CONSOLE_URL=$(oc whoami --show-console 2>/dev/null || echo "Unable to get console URL")
              PASSWORD_FILE="/credentials/${CLUSTER_NAME}-password"
              if [ -f "$PASSWORD_FILE" ]; then
                CLUSTER_PASSWORD=$(cat "$PASSWORD_FILE")
              else
                CLUSTER_PASSWORD="Not found"
              fi

              echo "========================================="
              echo "CLUSTER: $CLUSTER_NAME"
              echo "CONSOLE: $CONSOLE_URL"
              echo "PASSWORD: $CLUSTER_PASSWORD"
              echo "========================================="

              echo ""
              echo "Verifying imageContentSources (registry mirroring):"
              oc get imagecontentsourcepolicy -o yaml 2>/dev/null | grep -A5 "mirrors:" | head -15 || echo "No ImageContentSourcePolicy found"
              oc get imagedigestmirrorset -o yaml 2>/dev/null | grep -A5 "mirrors:" | head -15 || echo "No ImageDigestMirrorSet found"
              echo ""

              oc create namespace "$NAMESPACE" --dry-run=client -o yaml | oc apply -f -

              echo "Creating CatalogSource with registry-pull-secret for bundle image pulls..."
              cat <<EOF | oc apply -f -
              apiVersion: operators.coreos.com/v1alpha1
              kind: CatalogSource
              metadata:
                name: mta-konflux-catalog
                namespace: openshift-marketplace
              spec:
                sourceType: grpc
                image: $FBC_IMAGE
                secrets:
                  - registry-pull-secret
                displayName: MTA Konflux Catalog
                publisher: Red Hat
                grpcPodConfig:
                  securityContextConfig: restricted
                  extractContent:
                    catalogDir: /configs
                    cacheDir: /tmp/cache
                updateStrategy:
                  registryPoll:
                    interval: 10m
              EOF

              echo "✅ CatalogSource configured to use registry-pull-secret for image pulls"
              echo "   This should allow bundle unpacking pods to access registry.stage.redhat.io"
              echo ""

              for i in {1..60}; do
                STATE=$(oc get catalogsource mta-konflux-catalog -n openshift-marketplace -o jsonpath='{.status.connectionState.lastObservedState}' 2>/dev/null || echo "")
                if [ "$STATE" = "READY" ]; then
                  echo "✅ CatalogSource READY"
                  break
                fi
                if [ $i -eq 60 ]; then
                  echo "FAILED" > $(results.deploymentStatus.path)
                  exit 1
                fi
                sleep 5
              done

              cat <<EOF | oc apply -f -
              apiVersion: operators.coreos.com/v1
              kind: OperatorGroup
              metadata:
                name: mta-operator-group
                namespace: $NAMESPACE
              spec:
                targetNamespaces:
                  - $NAMESPACE
              EOF

              cat <<EOF | oc apply -f -
              apiVersion: operators.coreos.com/v1alpha1
              kind: Subscription
              metadata:
                name: mta-operator
                namespace: $NAMESPACE
              spec:
                channel: $CHANNEL_NAME
                installPlanApproval: Automatic
                name: $PACKAGE_NAME
                source: mta-konflux-catalog
                sourceNamespace: openshift-marketplace
              EOF

              echo "Waiting for operator installation (15 minute timeout)..."
              sleep 10

              for i in {1..180}; do
                # Check subscription status
                CSV=$(oc get subscription mta-operator -n "$NAMESPACE" -o jsonpath='{.status.installedCSV}' 2>/dev/null || echo "")
                if [ -n "$CSV" ]; then
                  PHASE=$(oc get csv "$CSV" -n "$NAMESPACE" -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
                  if [ "$PHASE" = "Succeeded" ]; then
                    echo "✅ Operator installed: $CSV"
                    echo "$CSV" > $(results.csvName.path)
                    break
                  fi
                fi

                # Print diagnostics every 30 seconds
                if [ $((i % 6)) -eq 0 ]; then
                  echo ""
                  echo "========================================="
                  echo "Iteration $i/180 ($(($i * 5)) seconds elapsed, $((15 - i/6)) minutes until timeout)"
                  echo "========================================="
                  echo "Waiting for CSV... ($i/180) - timeout in $((15 - i/6)) minutes"
                  echo "📊 Subscription status:"
                  if ! oc get subscription mta-operator -n "$NAMESPACE" -o yaml 2>/dev/null | grep -A10 "status:"; then
                    echo "⚠️  Failed to get subscription status (command error)"
                  fi
                  echo ""
                  echo "📦 InstallPlans:"
                  if ! oc get installplan -n "$NAMESPACE" 2>/dev/null; then
                    echo "No InstallPlans found (or command failed)"
                  fi
                  echo ""
                  echo "🔍 Pods in $NAMESPACE:"
                  if ! oc get pods -n "$NAMESPACE" 2>/dev/null; then
                    echo "No pods yet (or command failed)"
                  fi
                  echo ""
                  echo "🔍 Pods in openshift-marketplace (bundle unpacking):"
                  if ! oc get pods -n openshift-marketplace 2>/dev/null | grep -E "NAME|mta|bundle"; then
                    echo "No bundle-related pods (or command failed)"
                  fi
                  echo ""

                  # Check bundle pod's service account and imagePullSecrets
                  BUNDLE_POD=$(oc get pods -n openshift-marketplace --no-headers 2>/dev/null | grep -E "^[a-f0-9].*mta.*" | awk '{print $1}' | head -1 || echo "")
                  if [ -n "$BUNDLE_POD" ]; then
                    echo "🔍 Bundle pod details ($BUNDLE_POD):"
                    echo "  Service Account:"
                    oc get pod "$BUNDLE_POD" -n openshift-marketplace -o jsonpath='{.spec.serviceAccountName}' 2>/dev/null || echo "    N/A"
                    echo ""
                    echo "  ImagePullSecrets:"
                    oc get pod "$BUNDLE_POD" -n openshift-marketplace -o jsonpath='{.spec.imagePullSecrets[*].name}' 2>/dev/null || echo "    None"
                    echo ""
                    echo "  Pod Status:"
                    POD_STATUS=$(oc get pod "$BUNDLE_POD" -n openshift-marketplace -o jsonpath='{.status.phase}' 2>/dev/null)
                    echo "    Phase: $POD_STATUS"
                    echo ""

                    # If pod is failing, get detailed logs and error info
                    if [[ "$POD_STATUS" == *"Error"* ]] || [[ "$POD_STATUS" == *"Failed"* ]] || oc get pod "$BUNDLE_POD" -n openshift-marketplace -o jsonpath='{.status.containerStatuses[0].state.waiting.reason}' 2>/dev/null | grep -q "ImagePull"; then
                      echo "  ❌ Bundle pod is failing. Detailed diagnostics:"
                      echo ""
                      echo "  Container statuses:"
                      oc get pod "$BUNDLE_POD" -n openshift-marketplace -o jsonpath='{range .status.containerStatuses[*]}    Container: {.name}, State: {.state}, Message: {.state.waiting.message}{"\n"}{end}' 2>/dev/null || echo "    N/A"
                      echo ""
                      echo "  Pod logs (last 30 lines):"
                      oc logs "$BUNDLE_POD" -n openshift-marketplace --tail=30 2>&1 | sed 's/^/    /' || echo "    Cannot retrieve logs"
                      echo ""
                      echo "  Image being pulled:"
                      oc get pod "$BUNDLE_POD" -n openshift-marketplace -o jsonpath='{.spec.containers[0].image}' 2>/dev/null || echo "    N/A"
                      echo ""
                      echo "  Checking if imageContentSources mirroring is working:"
                      echo "  (Should try registry.stage.redhat.io first due to imageContentSources)"
                      oc get pod "$BUNDLE_POD" -n openshift-marketplace -o yaml 2>/dev/null | grep -A5 "message:" | head -10 | sed 's/^/    /'
                      echo ""
                    fi
                  fi

                  echo "🔍 Recent events in openshift-marketplace:"
                  if ! oc get events -n openshift-marketplace --sort-by='.lastTimestamp' 2>/dev/null | grep -i "pull\|error\|failed\|image" | tail -10; then
                    echo "No relevant events (or command failed)"
                  fi
                  echo ""
                  echo "🔍 Recent events in $NAMESPACE:"
                  if ! oc get events -n "$NAMESPACE" --sort-by='.lastTimestamp' 2>/dev/null | tail -5; then
                    echo "No events (or command failed)"
                  fi
                  echo "========================================="
                fi
                sleep 5
              done

              if [ -z "$CSV" ] || [ "$PHASE" != "Succeeded" ]; then
                echo "❌ Operator installation failed or timed out after 15 minutes"
                echo "CSV: $CSV, Phase: $PHASE"
                echo "FAILED" > $(results.deploymentStatus.path)
                exit 1
              fi

              oc wait --for=condition=available --timeout=300s deployment/mta-operator -n "$NAMESPACE"

              echo "========================================="
              echo "VERIFYING IMAGE SOURCES (stage-only test)"
              echo "========================================="
              echo "Checking which registry operator images were pulled from:"
              oc get pods -n "$NAMESPACE" -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{range .status.containerStatuses[*]}  {.name}: {.imageID}{"\n"}{end}{end}' | head -20
              echo ""
              echo "Checking catalog source pod images:"
              oc get pods -n openshift-marketplace -l olm.catalogSource=mta-konflux-catalog -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{range .status.containerStatuses[*]}  {.name}: {.imageID}{"\n"}{end}{end}'
              echo "========================================="

              cat <<EOF | oc apply -f -
              apiVersion: tackle.konveyor.io/v1alpha1
              kind: Tackle
              metadata:
                name: mta
                namespace: $NAMESPACE
              spec:
                provider_c_sharp_container_requests_memory: 512Mi
                provider_c_sharp_container_limits_memory: 512Mi
                provider_c_sharp_container_requests_cpu: 500m
                provider_c_sharp_container_limits_cpu: 500m
                language_discovery_container_limits_cpu: 500m
                language_discovery_container_requests_cpu: 500m
                language_discovery_container_limits_memory: 512Mi
                language_discovery_container_requests_memory: 512Mi
                analyzer_container_limits_cpu: 500m
                analyzer_container_requests_cpu: 500m
                analyzer_container_limits_memory: 512Mi
                analyzer_container_requests_memory: 512Mi
                provider_generic_container_limits_cpu: 500m
                provider_generic_container_requests_cpu: 500m
                provider_generic_container_limits_memory: 512Mi
                provider_generic_container_requests_memory: 512Mi
                provider_nodejs_container_limits_cpu: 500m
                provider_nodejs_container_requests_cpu: 500m
                provider_nodejs_container_limits_memory: 512Mi
                provider_nodejs_container_requests_memory: 512Mi
                hub_bucket_volume_size: "25Gi"
                cache_data_volume_size: "25Gi"
              EOF

              echo "Waiting for MTA UI deployment to be created..."
              for i in {1..120}; do
                if oc get deployment mta-ui -n "$NAMESPACE" &>/dev/null; then
                  echo "✅ MTA UI deployment exists"
                  break
                fi
                if [ $i -eq 120 ]; then
                  echo "ERROR: MTA UI deployment not created after 10 minutes"
                  echo "FAILED" > $(results.deploymentStatus.path)
                  exit 1
                fi
                sleep 5
              done

              echo "Waiting for MTA UI pods to be ready..."
              oc wait --for=condition=ready --timeout=900s pods -l app.kubernetes.io/name=mta-ui -n "$NAMESPACE"

              UI_ROUTE=$(oc get route mta -n "$NAMESPACE" -o jsonpath='{.spec.host}' 2>/dev/null || echo "")
              if [ -z "$UI_ROUTE" ]; then
                echo "ERROR: Could not get MTA route"
                echo "FAILED" > $(results.deploymentStatus.path)
                exit 1
              fi

              echo "✅ MTA UI: https://$UI_ROUTE"
              echo -n "$UI_ROUTE" > $(results.uiRoute.path)

              echo "Getting Keycloak admin password..."
              KEYCLOAK_SECRET="mta-keycloak-rhbk"
              for i in {1..60}; do
                if oc get secret "$KEYCLOAK_SECRET" -n "$NAMESPACE" &>/dev/null; then
                  KEYCLOAK_PASS=$(oc get secret "$KEYCLOAK_SECRET" -n "$NAMESPACE" -o jsonpath='{.data.password}' | base64 -d)
                  echo "✅ Keycloak password retrieved"
                  echo -n "$KEYCLOAK_PASS" > $(results.keycloakPassword.path)
                  break
                fi
                if [ $i -eq 60 ]; then
                  echo "WARNING: Could not get Keycloak password after 5 minutes, using default"
                  echo -n "admin" > $(results.keycloakPassword.path)
                  break
                fi
                sleep 5
              done

              echo "SUCCESS" > $(results.deploymentStatus.path)

    - name: run-e2e-tests
      runAfter:
        - deploy-operator
      params:
        - name: uiRoute
          value: $(tasks.deploy-operator.results.uiRoute)
        - name: keycloakPassword
          value: $(tasks.deploy-operator.results.keycloakPassword)
      taskSpec:
        params:
          - name: uiRoute
          - name: keycloakPassword
        steps:
          - name: run-tests
            image: cypress/included:15.7.0
            env:
              - name: CYPRESS_CACHE_FOLDER
                value: /tmp/.cache/Cypress
              - name: npm_config_cache
                value: /tmp/.cache/npm
            script: |
              #!/bin/bash
              set -euo pipefail

              UI_ROUTE="$(params.uiRoute)"
              KEYCLOAK_PASS="$(params.keycloakPassword)"
              BASE_URL="https://${UI_ROUTE}"

              echo "MTA UI: $BASE_URL"

              echo "Cloning tackle2-ui repository..."
              cd /tmp
              git clone --depth 1 --branch ui_test_konflux_integration https://github.com/sshveta/tackle2-ui.git
              cd tackle2-ui

              echo "Installing dependencies..."
              npm clean-install --ignore-scripts --no-audit
              npx cypress install

              echo "Building test spec for @ci tests..."
              cd cypress
              TEST_SPEC=$(node scripts/findTierFiles.mjs @ci)

              echo "Running Cypress E2E tests..."
              export CYPRESS_BASE_URL="$BASE_URL"
              export CYPRESS_USER="admin"
              export CYPRESS_INITIAL_PASSWORD="Passw0rd!"
              export CYPRESS_PASSWORD="Dog8code"
              export CYPRESS_KEYCLOAK_ADMIN_PASSWORD="$KEYCLOAK_PASS"
              export CYPRESS_INCLUDE_TAGS="@ci"
              export CYPRESS_EXCLUDE_TAGS="cf,downstream"

              npx cypress run \
                --spec "$TEST_SPEC" \
                --config-file cypress.config.ts \
                --reporter junit \
                --reporter-options "mochaFile=run/results-[hash].xml"
