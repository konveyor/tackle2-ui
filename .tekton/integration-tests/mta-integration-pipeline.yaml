apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: mta-ui-fbc-e2e-pipeline
spec:
  description: |
    Custom integration pipeline that:
    1. Deploys MTA operator via FBC catalog
    2. Patches the UI deployment to use the Snapshot image
    3. Runs E2E tests
    4. Cleans up resources

  params:
    - name: SNAPSHOT
      description: The Snapshot being tested (JSON string)
      type: string

    - name: CATALOG_IMAGE
      description: FBC catalog image containing MTA operator
      type: string
      default: "quay.io/konveyor/mta-operator-catalog:latest"

    - name: OPERATOR_PACKAGE_NAME
      description: Package name in the catalog
      type: string
      default: "mta-operator"

    - name: OPERATOR_CHANNEL
      description: Channel to subscribe to
      type: string
      default: "development"

    - name: OPERATOR_NAMESPACE
      description: Namespace to install operator
      type: string
      default: "konveyor-tackle"

    - name: TEST_TIER
      description: Test tier to execute
      type: string
      default: "@ci,@tier0"

  workspaces:
    - name: source
      description: Workspace containing test source code
      optional: true

  results:
    - name: TEST_PASSED
      description: Whether the tests passed
      value: $(tasks.run-e2e-tests.results.TEST_OUTPUT)

  tasks:
    # Step 1: Deploy FBC Operator
    - name: deploy-fbc-operator
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/tekton-integration-catalog.git
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/deploy-fbc-operator/0.1/deploy-fbc-operator.yaml
      params:
        - name: catalog_image
          value: $(params.CATALOG_IMAGE)
        - name: package_name
          value: $(params.OPERATOR_PACKAGE_NAME)
        - name: channel
          value: $(params.OPERATOR_CHANNEL)
        - name: namespace
          value: $(params.OPERATOR_NAMESPACE)
        - name: install_mode
          value: "AllNamespaces"

    # Step 2: Wait for operator to be ready
    - name: wait-for-operator
      runAfter:
        - deploy-fbc-operator
      taskSpec:
        params:
          - name: NAMESPACE
            type: string
        steps:
          - name: wait
            image: registry.redhat.io/openshift4/ose-cli:latest
            script: |
              #!/bin/bash
              set -euo pipefail

              echo "Waiting for MTA operator to be ready..."

              # Wait for operator deployment
              oc wait --for=condition=available --timeout=600s \
                deployment/tackle2-operator-controller-manager -n $(params.NAMESPACE) || \
              oc wait --for=condition=available --timeout=600s \
                deployment/konveyor-operator-controller-manager -n $(params.NAMESPACE)

              # Wait for Tackle CR to be created and ready
              echo "Waiting for Tackle CR..."
              for i in {1..60}; do
                if oc get tackle -n $(params.NAMESPACE) 2>/dev/null; then
                  echo "Tackle CR found!"
                  break
                fi
                echo "Attempt $i: Waiting for Tackle CR..."
                sleep 10
              done

              # Wait for all deployments to be ready
              echo "Waiting for all MTA components to be ready..."
              oc wait --for=condition=available --timeout=900s \
                deployment --all -n $(params.NAMESPACE)

              echo "✅ MTA operator and components are ready!"
      params:
        - name: NAMESPACE
          value: $(params.OPERATOR_NAMESPACE)

    # Step 3: Patch UI deployment with Snapshot image
    - name: patch-ui-image
      runAfter:
        - wait-for-operator
      taskSpec:
        params:
          - name: SNAPSHOT
            type: string
          - name: NAMESPACE
            type: string
        steps:
          - name: patch
            image: registry.redhat.io/openshift4/ose-cli:latest
            script: |
              #!/bin/bash
              set -euo pipefail

              echo "Extracting UI image from Snapshot..."
              # Parse SNAPSHOT JSON to get the UI component image
              UI_IMAGE=$(echo '$(params.SNAPSHOT)' | jq -r '.components[] | select(.name=="tackle2-ui") | .containerImage')

              if [ -z "$UI_IMAGE" ] || [ "$UI_IMAGE" == "null" ]; then
                echo "ERROR: Could not find tackle2-ui image in Snapshot"
                echo "Snapshot: $(params.SNAPSHOT)"
                exit 1
              fi

              echo "Patching tackle-ui deployment with image: $UI_IMAGE"

              oc set image deployment/tackle-ui \
                tackle-ui=$UI_IMAGE \
                -n $(params.NAMESPACE)

              echo "Waiting for rollout to complete..."
              oc rollout status deployment/tackle-ui -n $(params.NAMESPACE) --timeout=600s

              echo "✅ UI deployment updated successfully!"
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
        - name: NAMESPACE
          value: $(params.OPERATOR_NAMESPACE)

    # Step 4: Run E2E tests
    - name: run-e2e-tests
      runAfter:
        - patch-ui-image
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/sshveta/tackle2-ui.git
          - name: revision
            value: ui_test_konflux_integration
          - name: pathInRepo
            value: .tekton/integration-tests/mta-ui-e2e-task.yaml
      params:
        - name: UI_IMAGE
          value: "$(tasks.patch-ui-image.results.UI_IMAGE)"
        - name: NAMESPACE
          value: $(params.OPERATOR_NAMESPACE)
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
        - name: TEST_TIER
          value: $(params.TEST_TIER)
      workspaces:
        - name: source
          workspace: source

  finally:
    # Cleanup task that always runs
    - name: cleanup
      taskSpec:
        params:
          - name: NAMESPACE
            type: string
        steps:
          - name: collect-logs
            image: registry.redhat.io/openshift4/ose-cli:latest
            script: |
              #!/bin/bash
              set -euo pipefail

              echo "Collecting logs from MTA components..."

              oc logs deployment/tackle-ui -n $(params.NAMESPACE) --tail=500 || true
              oc logs deployment/tackle-hub -n $(params.NAMESPACE) --tail=500 || true

              echo "Describing failed pods (if any)..."
              oc get pods -n $(params.NAMESPACE) --field-selector=status.phase!=Running || true

          - name: cleanup-resources
            image: registry.redhat.io/openshift4/ose-cli:latest
            script: |
              #!/bin/bash
              set -euo pipefail

              echo "Cleaning up test resources..."

              # Delete Tackle CR (cascades to all resources)
              oc delete tackle --all -n $(params.NAMESPACE) --wait=false || true

              # Uninstall operator subscription
              oc delete subscription mta-operator -n $(params.NAMESPACE) --wait=false || true
              oc delete subscription konveyor-operator -n $(params.NAMESPACE) --wait=false || true

              # Clean up namespace (optional)
              # oc delete namespace $(params.NAMESPACE) --wait=false || true

              echo "✅ Cleanup initiated"
      params:
        - name: NAMESPACE
          value: $(params.OPERATOR_NAMESPACE)
