apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: mta-ui-e2e-tests
spec:
  description: |
    Run MTA UI E2E tests against deployed operator instance
  params:
    - name: UI_IMAGE
      description: The UI container image to test
      type: string

    - name: CYPRESS_BASE_URL
      description: Base URL for the UI
      type: string
      default: "http://tackle-ui.konveyor-tackle.svc.cluster.local:9000"

    - name: TEST_TIER
      description: Test tier tags to execute
      type: string
      default: "@ci,@tier0"

    - name: NAMESPACE
      description: Namespace where MTA is deployed
      type: string
      default: "konveyor-tackle"

    - name: SNAPSHOT
      description: The Snapshot being tested
      type: string
      default: ""

  workspaces:
    - name: source
      description: Workspace containing test code

  steps:
    - name: wait-for-ui-ready
      image: registry.redhat.io/openshift4/ose-cli:latest
      script: |
        #!/bin/bash
        set -euo pipefail

        echo "Waiting for MTA UI deployment to be ready..."
        oc wait --for=condition=available --timeout=600s \
          deployment/tackle-ui -n $(params.NAMESPACE)

        echo "MTA UI is ready!"

    - name: verify-ui-accessible
      image: registry.redhat.io/ubi9/ubi-minimal:latest
      script: |
        #!/bin/bash
        set -euo pipefail

        echo "Verifying UI is accessible at $(params.CYPRESS_BASE_URL)"
        for i in {1..30}; do
          if curl -f -s -o /dev/null $(params.CYPRESS_BASE_URL); then
            echo "UI is accessible!"
            exit 0
          fi
          echo "Attempt $i: UI not ready yet, waiting..."
          sleep 10
        done
        echo "ERROR: UI not accessible after 5 minutes"
        exit 1

    - name: install-dependencies
      image: registry.access.redhat.com/ubi9/nodejs-20:latest
      workingDir: /workspace/source/cypress
      script: |
        #!/bin/bash
        set -euo pipefail

        echo "Installing Cypress dependencies from source..."
        npm ci

        echo "Verifying Cypress installation..."
        npx cypress verify

    - name: run-e2e-tests
      image: registry.access.redhat.com/ubi9/nodejs-20:latest
      workingDir: /workspace/source/cypress
      env:
        - name: CYPRESS_BASE_URL
          value: $(params.CYPRESS_BASE_URL)
        - name: CYPRESS_USER
          value: "admin"
        - name: CYPRESS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mta-admin-credentials
              key: password
              optional: true
        - name: TEST_TAGS
          value: $(params.TEST_TIER)
        - name: CYPRESS_CACHE_FOLDER
          value: /tmp/.cache/Cypress
        - name: npm_config_cache
          value: /tmp/.cache/npm
      script: |
        #!/bin/bash
        set -euo pipefail

        echo "========================================="
        echo "Running MTA UI E2E Tests"
        echo "UI Image: $(params.UI_IMAGE)"
        echo "Base URL: $CYPRESS_BASE_URL"
        echo "Test Tags: $TEST_TAGS"
        echo "Snapshot: $(params.SNAPSHOT)"
        echo "========================================="

        # Run Cypress tests with specified tags
        npx cypress run \
          --config video=true,videosFolder=/workspace/source/cypress/run/videos \
          --reporter cypress-multi-reporters \
          --reporter-options "reporterEnabled=mocha-junit-reporter,cypress-mochawesome-reporter" \
          --env TAGS="$TEST_TAGS"

        TEST_EXIT_CODE=$?

        echo "========================================="
        if [ $TEST_EXIT_CODE -eq 0 ]; then
          echo "✅ E2E Tests PASSED"
          echo "PASSED" > $(results.TEST_OUTPUT.path)
        else
          echo "❌ E2E Tests FAILED (exit code: $TEST_EXIT_CODE)"
          echo "FAILED" > $(results.TEST_OUTPUT.path)
        fi
        echo "========================================="

        exit $TEST_EXIT_CODE

    - name: collect-results
      image: registry.redhat.io/ubi9/ubi-minimal:latest
      workingDir: /workspace/source
      script: |
        #!/bin/bash
        set -euo pipefail

        echo "Collecting test results and artifacts..."

        # Copy test results to a shared location if needed
        if [ -d "cypress/run/report" ]; then
          echo "Test report generated at: cypress/run/report/index.html"
          ls -la cypress/run/report/
        fi

        if [ -d "cypress/run/videos" ]; then
          echo "Test videos available in: cypress/run/videos/"
          ls -la cypress/run/videos/
        fi

        if [ -d "cypress/run/screenshots" ]; then
          echo "Screenshots available in: cypress/run/screenshots/"
          ls -la cypress/run/screenshots/
        fi

  results:
    - name: TEST_OUTPUT
      description: Test execution summary
